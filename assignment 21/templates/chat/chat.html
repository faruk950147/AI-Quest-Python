{% extends 'base.html' %}

{% block title %}Chat{% endblock %}

{% block content %}
<main class="chat-main mt-5">
    <div class="container">
        <div class="row">
            <div class="col-6 mx-auto">
                <!-- Chat Display Box -->
                <div class="chat-showbox mb-3">
                    <textarea class="form-control" id="chat-show" rows="10" readonly></textarea>
                </div>

                <!-- Input + Send Button -->
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="chat-input" placeholder="Type a message...">
                    <button class="btn btn-primary" id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}
